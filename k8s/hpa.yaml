# HorizontalPodAutoscaler for chat-service
# Scales on CPU utilisation and custom http_requests_per_second metric.
# min: 2 replicas (HA baseline)
# max: 8 replicas (cost cap + sufficient headroom for LLM inference latency)
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chat-service-hpa
  namespace: allergo-nordic
  labels:
    app: chat-service
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chat-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "10"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # 5-min cool-down prevents oscillation
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
