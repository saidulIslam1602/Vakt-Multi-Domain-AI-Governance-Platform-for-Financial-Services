# Secrets template for Allergo Nordic — Kubernetes
#
# DO NOT commit actual secret values. This file is a template only.
# Secrets are populated at deploy time via Azure Key Vault CSI driver.
#
# Required secrets (provision in Azure Key Vault before deploying):
#   - azure-openai-api-key          → AZURE_OPENAI_API_KEY
#   - azure-search-api-key          → AZURE_SEARCH_API_KEY
#   - database-url                  → DATABASE_URL (PostgreSQL connection string)
#   - storage-account-key           → AZURE_STORAGE_ACCOUNT_KEY
#   - rabbitmq-url                  → RABBITMQ_URL (amqp://user:pass@rabbitmq:5672)
#   - allergo-jwt-secret            → JWT_SECRET
#   - azure-openai-endpoint         → AZURE_OPENAI_ENDPOINT
#   - azure-search-endpoint         → AZURE_SEARCH_ENDPOINT
#   - azure-storage-account-name    → AZURE_STORAGE_ACCOUNT_NAME
#   - azure-storage-container-name  → AZURE_STORAGE_CONTAINER_NAME
#
# Provision with Azure Key Vault CSI driver:
#   https://learn.microsoft.com/en-us/azure/aks/csi-secrets-store-driver
#
# This template uses environment variable substitution — replace ${KV_NAME}
# and ${TENANT_ID} with your Azure Key Vault name and tenant ID.

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: allergo-nordic-keyvault
  namespace: allergo-nordic
spec:
  provider: azure
  secretObjects:
    - secretName: allergo-nordic-secrets
      type: Opaque
      data:
        - objectName: azure-openai-api-key
          key: AZURE_OPENAI_API_KEY
        - objectName: azure-search-api-key
          key: AZURE_SEARCH_API_KEY
        - objectName: database-url
          key: DATABASE_URL
        - objectName: storage-account-key
          key: AZURE_STORAGE_ACCOUNT_KEY
        - objectName: rabbitmq-url
          key: RABBITMQ_URL
        - objectName: allergo-jwt-secret
          key: JWT_SECRET
        - objectName: azure-openai-endpoint
          key: AZURE_OPENAI_ENDPOINT
        - objectName: azure-search-endpoint
          key: AZURE_SEARCH_ENDPOINT
        - objectName: azure-storage-account-name
          key: AZURE_STORAGE_ACCOUNT_NAME
        - objectName: azure-storage-container-name
          key: AZURE_STORAGE_CONTAINER_NAME
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "${MANAGED_IDENTITY_CLIENT_ID}"
    keyvaultName: "${KV_NAME}"
    cloudName: "AzurePublicCloud"
    objects: |
      array:
        - |
          objectName: azure-openai-api-key
          objectType: secret
        - |
          objectName: azure-search-api-key
          objectType: secret
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: storage-account-key
          objectType: secret
        - |
          objectName: rabbitmq-url
          objectType: secret
        - |
          objectName: allergo-jwt-secret
          objectType: secret
        - |
          objectName: azure-openai-endpoint
          objectType: secret
        - |
          objectName: azure-search-endpoint
          objectType: secret
        - |
          objectName: azure-storage-account-name
          objectType: secret
        - |
          objectName: azure-storage-container-name
          objectType: secret
    tenantId: "${TENANT_ID}"
