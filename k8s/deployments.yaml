# Allergo Nordic — Kubernetes Deployments
# One Deployment + Service per microservice.
# All services mount the shared ConfigMap and Secrets from allergo-nordic-secrets.
# Image references use the allergo-nordic ACR registry (replace ${ACR_REGISTRY} at deploy time).
---
# ── ingest-service ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-service
  namespace: allergo-nordic
  labels:
    app: ingest-service
    app.kubernetes.io/component: ingest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingest-service
  template:
    metadata:
      labels:
        app: ingest-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8001"
    spec:
      containers:
        - name: ingest-service
          image: ${ACR_REGISTRY}/ingest-service:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: allergo-nordic-config
            - secretRef:
                name: allergo-nordic-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ingest-service
  namespace: allergo-nordic
spec:
  selector:
    app: ingest-service
  ports:
    - port: 8001
      targetPort: 8001
---
