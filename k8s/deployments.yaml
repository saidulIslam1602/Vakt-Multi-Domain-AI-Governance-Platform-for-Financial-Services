# ── chat-service ──────────────────────────────────────────────────────────────
# Primary AI inference service — receives higher resource limits.
# Scaled by the HPA in hpa.yaml (min 2 / max 8).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: allergo-nordic
  labels:
    app: chat-service
    app.kubernetes.io/component: chat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8005"
    spec:
      containers:
        - name: chat-service
          image: ${ACR_REGISTRY}/chat-service:latest
          ports:
            - containerPort: 8005
          envFrom:
            - configMapRef:
                name: allergo-nordic-config
            - secretRef:
                name: allergo-nordic-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: allergo-nordic
spec:
  selector:
    app: chat-service
  ports:
    - port: 8005
      targetPort: 8005
---
# ── frontend ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: allergo-nordic
  labels:
    app: frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ${ACR_REGISTRY}/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "http://chat-service:8005"
            - name: NEXT_PUBLIC_INGEST_URL
              value: "http://ingest-service:8001"
            - name: NEXT_PUBLIC_DOCUMENT_URL
              value: "http://document-service:8002"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: allergo-nordic
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/"
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
