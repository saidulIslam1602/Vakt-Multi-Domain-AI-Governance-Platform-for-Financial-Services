name: CI — Python service (reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: Short name of the service (e.g. ingest-service)
        required: true
        type: string
      service_dir:
        description: Path to the service root (e.g. services/ingest-service)
        required: true
        type: string
      run_migrations:
        description: Set to true to run SQL migrations after deploy (ingest-service only)
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
      KEY_VAULT_NAME:
        required: false

jobs:
  lint-and-test:
    name: Lint & test (${{ inputs.service_name }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_dir }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install shared-lib and service deps
        run: |
          pip install ../shared-lib
          pip install ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        run: mypy src

      - name: Tests
        run: pytest --cov=src --cov-report=xml --cov-fail-under=0

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ${{ inputs.service_dir }}/coverage.xml
          flags: ${{ inputs.service_name }}
        continue-on-error: true

  docker-build-push:
    name: Build & push image (${{ inputs.service_name }})
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      vars.AZURE_CONFIGURED == 'true'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push
        run: |
          IMAGE=${{ vars.ACR_NAME }}.azurecr.io/${{ inputs.service_name }}:${{ github.sha }}
          docker build -t "$IMAGE" \
            -f ${{ inputs.service_dir }}/Dockerfile \
            --build-arg SERVICE_DIR=${{ inputs.service_dir }} \
            .
          docker push "$IMAGE"
          docker tag "$IMAGE" ${{ vars.ACR_NAME }}.azurecr.io/${{ inputs.service_name }}:latest
          docker push ${{ vars.ACR_NAME }}.azurecr.io/${{ inputs.service_name }}:latest

  deploy:
    name: Deploy (${{ inputs.service_name }})
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App revision
        run: |
          az containerapp update \
            --name ${{ inputs.service_name }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/${{ inputs.service_name }}:${{ github.sha }}

  # ──────────────────────────────────────────────────────────────────────────
  # migrate-db: runs SQL migrations via a one-off psql container inside
  # Azure Container Apps Jobs.  Only fires when run_migrations=true (ingest).
  # The DATABASE_URL is pulled from Azure Key Vault at runtime — no secret
  # is ever written into the workflow YAML.
  # ──────────────────────────────────────────────────────────────────────────
  migrate-db:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: deploy
    if: >
      inputs.run_migrations == true &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      vars.AZURE_CONFIGURED == 'true'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Fetch DATABASE_URL from Key Vault — never stored as a repo secret
      - name: Fetch DATABASE_URL from Key Vault
        run: |
          DB_URL=$(az keyvault secret show \
            --vault-name "${{ secrets.KEY_VAULT_NAME }}" \
            --name database-url \
            --query value \
            --output tsv)
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Ensure pgcrypto is allow-listed on Azure Flexible Server
        run: |
          # Install psql client
          sudo apt-get install -y postgresql-client

          # Attempt to create the extension.  On Azure Flexible Server,
          # this will fail with "not allow-listed" unless PGCRYPTO was added
          # to azure.extensions via Terraform (see infra/postgresql.tf).
          # We check here so the failure message is clear and actionable.
          result=$(psql "$DATABASE_URL" -tAc \
            "SELECT COUNT(*) FROM pg_extension WHERE extname = 'pgcrypto'" 2>&1)

          if echo "$result" | grep -q "^1$"; then
            echo "✅ pgcrypto extension already installed."
          else
            echo "⚙ pgcrypto not yet installed — attempting CREATE EXTENSION..."
            if psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;" 2>&1; then
              echo "✅ pgcrypto installed successfully."
            else
              echo ""
              echo "❌ FAILED: pgcrypto is not allow-listed on Azure Flexible Server."
              echo ""
              echo "Fix: add PGCRYPTO to azure.extensions in infra/postgresql.tf and run:"
              echo "  cd infra && terraform apply"
              echo ""
              echo "The infra/postgresql.tf already contains the fix in this commit."
              echo "Apply it and re-run this workflow."
              exit 1
            fi
          fi

      - name: Run SQL migrations (psql)
        run: |
          MIGRATIONS_DIR=services/ingest-service/src/ingest_service/infrastructure/db/migrations

          for f in $(ls $MIGRATIONS_DIR/*.sql | sort); do
            echo "▶ Applying $f ..."
            psql "$DATABASE_URL" \
              --set ON_ERROR_STOP=1 \
              --single-transaction \
              -f "$f"
            echo "✔ $f applied."
          done

          echo "✅ All migrations complete."
