name: CI — Python service (reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: Short name of the service (e.g. ingest-service)
        required: true
        type: string
      service_dir:
        description: Path to the service root (e.g. services/ingest-service)
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

jobs:
  lint-and-test:
    name: Lint & test (${{ inputs.service_name }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_dir }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install shared-lib and service deps
        run: |
          pip install ../shared-lib
          pip install ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy)
        run: mypy src

      - name: Tests
        run: pytest --cov=src --cov-report=xml --cov-fail-under=0

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ${{ inputs.service_dir }}/coverage.xml
          flags: ${{ inputs.service_name }}
        continue-on-error: true

  docker-build-push:
    name: Build & push image (${{ inputs.service_name }})
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push
        run: |
          IMAGE=${{ vars.ACR_NAME }}.azurecr.io/${{ inputs.service_name }}:${{ github.sha }}
          docker build -t "$IMAGE" \
            -f ${{ inputs.service_dir }}/Dockerfile \
            --build-arg SERVICE_DIR=${{ inputs.service_dir }} \
            .
          docker push "$IMAGE"
          docker tag "$IMAGE" ${{ vars.ACR_NAME }}.azurecr.io/${{ inputs.service_name }}:latest
          docker push ${{ vars.ACR_NAME }}.azurecr.io/${{ inputs.service_name }}:latest

  deploy:
    name: Deploy (${{ inputs.service_name }})
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App revision
        run: |
          az containerapp update \
            --name ${{ inputs.service_name }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/${{ inputs.service_name }}:${{ github.sha }}
