name: CI — processing-service

on:
  push:
    branches: [main]
    paths:
      - "services/processing-service/**"
      - "services/shared-lib/**"
      - ".github/workflows/ci-processing.yml"
      - ".github/workflows/ci-python-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/processing-service/**"
      - "services/shared-lib/**"
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci-python-service.yml
    permissions:
      id-token: write
      contents: read
    with:
      service_name: processing-service
      service_dir: services/processing-service
    secrets: inherit
