name: CI — ingest-service

on:
  push:
    branches: [main]
    paths:
      - "services/ingest-service/**"
      - "services/shared-lib/**"
      - ".github/workflows/ci-ingest.yml"
      - ".github/workflows/ci-python-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/ingest-service/**"
      - "services/shared-lib/**"
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci-python-service.yml
    permissions:
      id-token: write
      contents: read
    with:
      service_name: ingest-service
      service_dir: services/ingest-service
      run_migrations: true
    secrets: inherit
