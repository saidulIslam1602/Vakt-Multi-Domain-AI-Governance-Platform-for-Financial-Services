name: IaC policy scan

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/ci-infra-scan.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov (Terraform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install "checkov~=3.2"

      - name: Scan infra/ (CLI + JSON artifact)
        working-directory: infra
        run: |
          checkov -d . --framework terraform --soft-fail -o cli --compact
          checkov -d . --framework terraform --soft-fail -o json --output-file "$GITHUB_WORKSPACE/checkov-results.json"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: checkov-results.json

  import-findings:
    name: Import findings → DB (main only)
    runs-on: ubuntu-latest
    needs: checkov
    # Only run on pushes to main when DEV_DATABASE_URL secret is configured.
    # On PRs or when the secret is absent this step is silently skipped.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install asyncpg
        run: pip install asyncpg

      - name: Download Checkov artifact
        uses: actions/download-artifact@v4
        with:
          name: checkov-results

      - name: Import findings into infra_findings
        # Skips gracefully if DATABASE_URL secret is not set
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          SOURCE_SCAN_ID: ${{ github.sha }}
          TENANT_ID: dev-tenant
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DEV_DATABASE_URL secret not set — skipping DB import."
            echo "To enable: add DEV_DATABASE_URL to repository secrets."
            exit 0
          fi
          python scripts/import_checkov_findings.py \
            --input checkov-results.json \
            --tenant "$TENANT_ID" \
            --source-scan-id "$SOURCE_SCAN_ID"
