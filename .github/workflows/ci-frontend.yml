name: CI — frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  lint-and-build:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

  docker-build-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push
        working-directory: frontend
        run: |
          IMAGE=${{ vars.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}

          # Pass Azure service URLs as build args so next.config.js rewrites
          # are baked with the correct HTTPS FQDNs at docker build time.
          # Without these, Next.js falls back to the docker-compose hostnames
          # (http://ingest-service:8000) which are unreachable on Azure.
          docker build --no-cache \
            --build-arg INGEST_SERVICE_URL=https://ingest-service.orangetree-41094962.norwayeast.azurecontainerapps.io \
            --build-arg DOCUMENT_SERVICE_URL=https://document-service.orangetree-41094962.norwayeast.azurecontainerapps.io \
            --build-arg SEARCH_SERVICE_URL=https://search-service.orangetree-41094962.norwayeast.azurecontainerapps.io \
            --build-arg CHAT_SERVICE_URL=https://chat-service.orangetree-41094962.norwayeast.azurecontainerapps.io \
            -t "$IMAGE" .
          docker push "$IMAGE"
          docker tag "$IMAGE" ${{ vars.ACR_NAME }}.azurecr.io/frontend:latest
          docker push ${{ vars.ACR_NAME }}.azurecr.io/frontend:latest

  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App revision
        run: |
          az containerapp update \
            --name frontend \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
