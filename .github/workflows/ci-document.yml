name: CI — document-service

on:
  push:
    branches: [main]
    paths:
      - "services/document-service/**"
      - "services/shared-lib/**"
      - ".github/workflows/ci-document.yml"
      - ".github/workflows/ci-python-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/document-service/**"
      - "services/shared-lib/**"
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci-python-service.yml
    with:
      service_name: document-service
      service_dir: services/document-service
    secrets: inherit
