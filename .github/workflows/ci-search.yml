name: CI — search-service

on:
  push:
    branches: [main]
    paths:
      - "services/search-service/**"
      - "services/shared-lib/**"
      - ".github/workflows/ci-search.yml"
      - ".github/workflows/ci-python-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/search-service/**"
      - "services/shared-lib/**"
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci-python-service.yml
    with:
      service_name: search-service
      service_dir: services/search-service
    secrets: inherit
