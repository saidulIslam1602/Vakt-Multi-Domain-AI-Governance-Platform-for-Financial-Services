name: CI — chat-service

on:
  push:
    branches: [main]
    paths:
      - "services/chat-service/**"
      - "services/shared-lib/**"
      - ".github/workflows/ci-chat.yml"
      - ".github/workflows/ci-python-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/chat-service/**"
      - "services/shared-lib/**"
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci-python-service.yml
    with:
      service_name: chat-service
      service_dir: services/chat-service
    secrets: inherit
